<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Kirin Audio Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-container">
        <div class="display-screen">
            <div id="player-yt"></div>
            <div id="radio-visual">
                <div class="v-ring"></div>
                <span id="live-tag" style="color:#0ff; font-size:10px; margin-top:15px; letter-spacing:2px; display:none;">LIVE STREAMING</span>
            </div>
        </div>
        
        <div id="meta-shelf">
            <span id="track-title">Ready...</span>
            <span id="track-artist">YouTube / MP3 / Radio</span>
            <div class="progress-container"><div id="progress-bar"></div></div>
            <div class="time-info">
                <span id="cur-time">0:00</span>
                <span id="total-time">0:00</span>
            </div>
        </div>
        
        <div class="input-group">
            <input id="url-in" placeholder="Paste Link & Enter..." type="text">
            <button class="btn-load" onclick="playKirin()">GO</button>
        </div>

        <div class="controls-row">
            <button class="ctrl-btn" onclick="prevTrack()">&#10094;&#10094;</button>
            <button class="ctrl-btn" id="main-play-btn" onclick="togglePlay()">&#9654;</button>
            <button class="ctrl-btn" onclick="nextTrack()">&#10095;&#10095;</button>
        </div>

        <div class="player-footer">
            &#169; <span id="year-display"></span> Kirin Audio | All Rights Reserved
        </div>

        <audio id="aud-engine" ontimeupdate="updateAudio()"></audio>
    </div>

    <button class="playlist-trigger" onclick="toggleDrawer()">&#9776;</button>

    <div id="drawer">
        <div class="drawer-header">
            <h3 style="margin:0; color:#0ff;">Playlist</h3>
            <button class="drawer-close" onclick="toggleDrawer()">&#215;</button>
        </div>
        <div id="list-items">
            <div style="color:#444; text-align:center; padding-top:20px;">No Playlist Loaded</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="scripts.js"></script>
</body>
</html>
